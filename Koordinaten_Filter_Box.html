<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koordinaten Filter Box</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1f2e;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #12161f;
    border-bottom: 1px solid #2a3148;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header .logo {
    width: 32px; height: 32px;
    background: #e8542a;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: white;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #e8eaf0;
    letter-spacing: 0.01em;
  }

  header span {
    font-size: 13px;
    color: #6b7494;
    margin-left: 4px;
  }

  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
    height: calc(100vh - 57px);
  }

  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: #12161f;
    border-right: 1px solid #2a3148;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section {
    padding: 20px;
    border-bottom: 1px solid #1e2436;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b7494;
    margin-bottom: 14px;
  }

  label {
    font-size: 12px;
    color: #9ba3c0;
    display: block;
    margin-bottom: 5px;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: #1a1f2e;
    border: 1px solid #2a3148;
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 13px;
    color: #e8eaf0;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  input[type="text"]:focus, input[type="number"]:focus {
    border-color: #e8542a;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-row > div { flex: 1; }

  .hint {
    font-size: 11px;
    color: #4a5270;
    margin-top: 6px;
    line-height: 1.5;
  }

  .btn-parse {
    width: 100%;
    margin-top: 12px;
    background: #e8542a;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }

  .btn-parse:hover { background: #d4481e; }

  .map-layer-row {
    display: flex;
    gap: 6px;
  }

  .layer-btn {
    flex: 1;
    padding: 7px 6px;
    font-size: 12px;
    border: 1px solid #2a3148;
    border-radius: 6px;
    background: #1a1f2e;
    color: #9ba3c0;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }

  .layer-btn.active {
    background: #1e2a3a;
    border-color: #378add;
    color: #7fc0f5;
  }

  .result-card {
    background: #1a1f2e;
    border: 1px solid #2a3148;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .result-label {
    font-size: 11px;
    color: #6b7494;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-value {
    font-size: 15px;
    font-weight: 600;
    color: #e8eaf0;
    font-variant-numeric: tabular-nums;
    flex: 1;
    letter-spacing: 0.02em;
  }

  .result-value.empty {
    color: #3a4060;
    font-size: 13px;
    font-weight: 400;
  }

  .btn-copy {
    background: #1e2a3a;
    border: 1px solid #2a3148;
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 11px;
    color: #7fc0f5;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
    font-weight: 500;
  }

  .btn-copy:hover {
    background: #253347;
    border-color: #378add;
  }

  .btn-copy.copied {
    background: #1a3024;
    border-color: #3b6d11;
    color: #97c459;
  }

  .coords-pair {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .coords-pair .result-card {
    flex: 1;
    margin-bottom: 0;
  }

  .radius-display {
    font-size: 22px;
    font-weight: 700;
    color: #e8542a;
    line-height: 1;
  }

  .radius-sub {
    font-size: 11px;
    color: #6b7494;
    margin-top: 2px;
  }

  #map {
    flex: 1;
    background: #0d1117;
    border: 2px solid #e8542a;
  }

  .crosshair-info {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(18,22,31,0.92);
    border: 1px solid #2a3148;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    color: #9ba3c0;
    pointer-events: none;
    z-index: 1000;
    white-space: nowrap;
  }

  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #6b7494;
    margin-right: 6px;
    vertical-align: middle;
  }

  .status-dot.active { background: #3b6d11; }

  .copy-all-btn {
    width: 100%;
    background: #1a2535;
    border: 1px solid #2a3148;
    border-radius: 6px;
    padding: 10px;
    font-size: 12px;
    color: #9ba3c0;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    margin-top: 4px;
  }

  .copy-all-btn:hover {
    background: #1e2d40;
    color: #7fc0f5;
    border-color: #378add;
  }

  @media (max-width: 700px) {
    .layout { flex-direction: column; height: auto; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #2a3148; }
    #map { height: 350px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">S</div>
  <h1>Koordinaten Filter Box <span>— Bounding Box Rechner</span></h1>
</header>

<div class="layout">
  <div class="sidebar">

    <div class="section">
      <div class="section-title">Eingabe</div>

      <label>Koordinaten aus Google Maps</label>
      <input type="text" id="gmaps-input" placeholder="z.B. 49.01244, 12.03273" />
      <div class="hint">Format: Lat, Long — direkt aus Google Maps kopieren</div>
      <button class="btn-parse" onclick="parseGMaps()">Auf Karte setzen</button>
    </div>

    <div class="section">
      <div class="section-title">Radius</div>
      <div class="input-row">
        <div>
          <label>Meter</label>
          <input type="number" id="radius-input" value="10000" min="100" max="500000" step="100" oninput="recalculate()"/>
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:1px;">
          <div>
            <div class="radius-display" id="radius-km">10,0</div>
            <div class="radius-sub">km</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Kartenebene</div>
      <div class="map-layer-row">
        <button class="layer-btn" id="btn-osm" onclick="switchLayer('osm')">OpenStreetMap</button>
        <button class="layer-btn active" id="btn-rail" onclick="switchLayer('rail')">OpenRailwayMap</button>
      </div>
    </div>

    <div class="section" style="flex:1;">
      <div class="section-title">
        <span class="status-dot" id="status-dot"></span>Ergebnisse
      </div>

      <div class="coords-pair">
        <div class="result-card">
          <div class="result-label">lat_min (≥)</div>
          <div class="result-row">
            <div class="result-value empty" id="val-lat-min">—</div>
            <button class="btn-copy" onclick="copyVal('val-lat-min', this)">Kopieren</button>
          </div>
        </div>
        <div class="result-card">
          <div class="result-label">lat_max (≤)</div>
          <div class="result-row">
            <div class="result-value empty" id="val-lat-max">—</div>
            <button class="btn-copy" onclick="copyVal('val-lat-max', this)">Kopieren</button>
          </div>
        </div>
      </div>

      <div class="coords-pair">
        <div class="result-card">
          <div class="result-label">long_min (≥)</div>
          <div class="result-row">
            <div class="result-value empty" id="val-long-min">—</div>
            <button class="btn-copy" onclick="copyVal('val-long-min', this)">Kopieren</button>
          </div>
        </div>
        <div class="result-card">
          <div class="result-label">long_max (≤)</div>
          <div class="result-row">
            <div class="result-value empty" id="val-long-max">—</div>
            <button class="btn-copy" onclick="copyVal('val-long-max', this)">Kopieren</button>
          </div>
        </div>
      </div>

      <button class="copy-all-btn" onclick="copyAll()">Alle 4 Werte kopieren (kommagetrennt)</button>
    </div>

  </div>

  <div style="position:relative;flex:1;display:flex;flex-direction:column;">
    <div id="map"></div>
    <div class="crosshair-info" id="click-hint">Auf Karte klicken um Koordinaten zu wählen</div>
  </div>
</div>

<script>
const DEG2RAD = Math.PI / 180;

let marker = null;
let boundingBox = null;
let currentLat = null;
let currentLng = null;

const map = L.map('map', { zoomControl: true }).setView([49.1970791, 11.3597205], 10);

const layers = {
  osm: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }),
  rail: L.tileLayer('https://tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, © <a href="https://www.openrailwaymap.org/">OpenRailwayMap</a>',
    maxZoom: 19,
    opacity: 0.8
  })
};

layers.osm.addTo(map);
layers.rail.addTo(map);
let currentLayer = 'rail';

function switchLayer(name) {
  document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');

  if (name === 'osm') {
    if (map.hasLayer(layers.rail)) { map.removeLayer(layers.rail); }
    if (!map.hasLayer(layers.osm)) { layers.osm.addTo(map); }
    currentLayer = 'osm';
  } else {
    if (!map.hasLayer(layers.osm)) { layers.osm.addTo(map); }
    if (!map.hasLayer(layers.rail)) { layers.rail.addTo(map); }
    currentLayer = 'rail';
  }
}

map.on('click', function(e) {
  setLocation(e.latlng.lat, e.latlng.lng);
});

function setLocation(lat, lng) {
  currentLat = lat;
  currentLng = lng;

  if (marker) map.removeLayer(marker);
  marker = L.circleMarker([lat, lng], {
    radius: 7,
    color: '#e8542a',
    fillColor: '#e8542a',
    fillOpacity: 1,
    weight: 2
  }).addTo(map);

  document.getElementById('click-hint').textContent =
    lat.toFixed(6) + ', ' + lng.toFixed(6);
  document.getElementById('status-dot').classList.add('active');

  recalculate();
}

function recalculate() {
  if (currentLat === null) return;

  const radius = parseFloat(document.getElementById('radius-input').value) || 10000;
  document.getElementById('radius-km').textContent = (radius / 1000).toLocaleString('de-DE', {maximumFractionDigits: 1});

  const deltaLat = radius / 111320;
  const deltaLng = radius / (111320 * Math.cos(currentLat * DEG2RAD));

  const latMin = currentLat - deltaLat;
  const latMax = currentLat + deltaLat;
  const lngMin = currentLng - deltaLng;
  const lngMax = currentLng + deltaLng;

  setResult('val-lat-min', latMin);
  setResult('val-lat-max', latMax);
  setResult('val-long-min', lngMin);
  setResult('val-long-max', lngMax);

  if (boundingBox) map.removeLayer(boundingBox);
  boundingBox = L.rectangle(
    [[latMin, lngMin], [latMax, lngMax]],
    { color: '#e8542a', weight: 2, fillColor: '#e8542a', fillOpacity: 0.08 }
  ).addTo(map);

  map.fitBounds([[latMin, lngMin], [latMax, lngMax]], { padding: [40, 40] });
}

function setResult(id, val) {
  const el = document.getElementById(id);
  el.textContent = val.toFixed(7);
  el.classList.remove('empty');
}

function parseGMaps() {
  const raw = document.getElementById('gmaps-input').value.trim();
  const match = raw.match(/(-?\d+[\.,]\d+)[,;\s]+(-?\d+[\.,]\d+)/);
  if (!match) {
    alert('Format nicht erkannt. Bitte "Lat, Long" eingeben, z.B. 49.01244, 12.03273');
    return;
  }
  const lat = parseFloat(match[1].replace(',', '.'));
  const lng = parseFloat(match[2].replace(',', '.'));
  map.setView([lat, lng], 12);
  setLocation(lat, lng);
}

function copyVal(id, btn) {
  const val = document.getElementById(id).textContent;
  if (val === '—') return;
  navigator.clipboard.writeText(val).then(() => {
    btn.textContent = 'Kopiert!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Kopieren';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function copyAll() {
  const ids = ['val-lat-min', 'val-lat-max', 'val-long-min', 'val-long-max'];
  const vals = ids.map(id => document.getElementById(id).textContent);
  if (vals[0] === '—') return;
  navigator.clipboard.writeText(vals.join(', ')).then(() => {
    const btn = event.target;
    btn.textContent = 'Alle Werte kopiert!';
    setTimeout(() => { btn.textContent = 'Alle 4 Werte kopieren (kommagetrennt)'; }, 2000);
  });
}
</script>
</body>
</html>
